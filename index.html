<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BANKER RW 12</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --primary: #00ff00; --secondary: #075e54; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: #333; }
        
        /* LOGIN UI - PERBAIKAN UNTUK SAFARI iOS */
        /* Menggunakan 100dvh agar tidak tertutup bar Safari bawah */
        #loginPage { display: flex; align-items: center; justify-content: center; min-height: 100vh; min-height: 100dvh; background: white; }
        .login-card { width: 90%; max-width: 350px; text-align: center; }
        .field-box { 
            background: var(--primary); border-radius: 50px; margin-bottom: 15px; 
            display: flex; align-items: center; padding: 8px 20px; box-sizing: border-box;
        }
        .field-box span { font-weight: bold; width: 90px; text-align: left; font-size: 14px; color: #000; }
        .field-box input { 
            border: none; background: rgba(255,255,255,0.8); border-radius: 20px; 
            padding: 8px 12px; width: 100%; outline: none; font-size: 16px;
        }

        /* DASHBOARD & MENU */
        .halaman { display: none; min-height: 100vh; padding-bottom: 50px; }
        .header-app { background: var(--secondary); color: white; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; position: relative; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .btn-menu { 
            aspect-ratio: 1/1; border: none; border-radius: 20px; color: white; font-weight: bold; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            gap: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); cursor: pointer;
        }
        
        /* FORM & TABEL */
        .card { background: white; padding: 15px; margin: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        label { font-weight: bold; display: block; margin: 10px 0 5px; font-size: 13px; }
        input[type="text"], input[type="number"], input[type="date"], input[type="password"], input[list] { 
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px;
        }
        .bg-biru { background-color: #d1ecf1 !important; border: 2px solid #0c5460; font-weight: bold; }
        .bg-kuning { background-color: #fff3cd !important; border: 2px solid #856404; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f8f9fa; }

        /* BUTTONS */
        .btn-action { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; color: white; margin-top: 10px; cursor: pointer; font-size: 14px; }
        .btn-blue { background: #1e73d8; } 
        .btn-green { background: #2ca24c; } 
        .btn-orange { background: #f39c12; } 
        .btn-red { background: #dc3545; }
        .btn-lightgreen { background: var(--primary); color: black; }

        /* CHAT UI */
        .chat-area { height: 50vh; overflow-y: auto; padding: 15px; background: #e5ddd5; display: flex; flex-direction: column; gap: 10px; border-radius: 10px; }
        .bubble { max-width: 80%; padding: 10px; border-radius: 10px; font-size: 14px; }
        .kanan { align-self: flex-end; background: #dcf8c6; }
        .kiri { align-self: flex-start; background: white; }

        /* PRINT STYLING */
        @media print {
            body * { visibility: hidden; }
            #boxStruk, #boxStruk * { visibility: visible; }
            #boxStruk { position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 10px; box-shadow: none; border: none; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

<div id="loginPage">
    <div class="login-card">
        <h1 style="margin-bottom:10px;">BANKER RW 12</h1>
        <p style="color:#666; margin-bottom:30px;">Silakan Masuk ke Sistem</p>
        <div class="field-box">
            <span>Login</span>
            <input type="text" id="userLogin" placeholder="Username" autocapitalize="none" autocorrect="off" autocomplete="off">
        </div>
        <div class="field-box">
            <span>Password</span>
            <input type="password" id="passLogin" placeholder="******">
        </div>
        <button type="button" class="btn-action btn-lightgreen" style="border-radius:50px; font-size:18px;" onclick="prosesLogin()">MASUK</button>
    </div>
</div>

<div id="hal-dashboard" class="halaman">
    <div class="header-app">
        <h2 style="margin:0;">BANKER RW 12</h2>
        <small id="helloUser">Petugas: -</small>
    </div>
    <div class="menu-grid">
        <button type="button" class="btn-menu btn-blue" onclick="bukaHalaman('hal-input')">📝 <span>INPUT DATA</span></button>
        <button type="button" class="btn-menu btn-green" onclick="bukaHalaman('hal-riwayat')">📜 <span>RIWAYAT</span></button>
        <button type="button" class="btn-menu btn-orange" onclick="bukaHalaman('hal-harga')">💰 <span>DAFTAR HARGA</span></button>
        <button type="button" class="btn-menu btn-lightgreen" onclick="bukaHalaman('hal-pesan')">💬 <span>PESAN</span></button>
    </div>
    <center><button type="button" class="btn-action btn-red" style="width:80%; margin-top:40px;" onclick="logout()">🚪 KELUAR (LOGOUT)</button></center>
</div>

<div id="hal-input" class="halaman">
    <div class="header-app">
        <button type="button" onclick="bukaHalaman('hal-dashboard')" style="position:absolute; left:20px; top:25px; background:none; border:none; color:white; font-size:24px;">←</button>
        <h3>INPUT TIMBANGAN</h3>
    </div>
    <div class="card no-print">
        <label>Tanggal</label><input type="date" id="tgl">
        <label>Data Nasabah</label>
        <div style="display:flex; gap:8px;"><input type="text" id="nama" placeholder="Nama" style="flex:2"><input type="text" id="rt" placeholder="RT" style="flex:1"></div>
        
        <label>Pilih Jenis Sampah</label>
        <input list="daftarSampah" id="jenisInput" placeholder="-- Cari atau Pilih --" onchange="pilihBarang()">
        <datalist id="daftarSampah"></datalist>

        <label>Harga Satuan (Rp)</label><input type="number" id="harga" class="bg-biru" readonly>
        <label>Berat (Kg)</label><input type="text" id="berat" placeholder="0.0" inputmode="decimal" oninput="hitungSub()">
        <label>Subtotal</label><input type="text" id="subtotal" class="bg-kuning" readonly>
        
        <button type="button" class="btn-action btn-green" onclick="tambahItem()">+ TAMBAH KE NOTA</button>
    </div>

    <div id="boxStruk" class="card" style="display:none;">
        <center>
            <h3 style="margin:5px 0;">BANKER RW 12</h3>
            <p style="font-size:12px; margin:0;">Bukti Timbangan Sampah</p>
        </center>
        <hr>
        <div id="infoStruk" style="font-size:12px; line-height:1.6;"></div>
        <table>
            <thead><tr><th>Item</th><th>Kg</th><th>Total</th><th class="no-print">Aksi</th></tr></thead>
            <tbody id="isiStruk"></tbody>
        </table>
        <h3 id="totalStruk" style="text-align:right; margin-top:15px; border-top:1px solid #eee; padding-top:10px;">Total: Rp 0</h3>
        <div class="no-print">
            <button type="button" class="btn-action btn-blue" onclick="window.print()">🖨️ CETAK / SIMPAN PDF</button>
            <button type="button" class="btn-action btn-orange" id="btnSimpanMain" onclick="simpanTransaksi()">💾 SIMPAN DATA KE RIWAYAT</button>
            <button type="button" class="btn-action btn-red" onclick="resetForm()">🗑️ BATAL / NOTA BARU</button>
        </div>
    </div>
</div>

<div id="hal-riwayat" class="halaman">
    <div class="header-app"><button type="button" onclick="bukaHalaman('hal-dashboard')" style="position:absolute; left:20px; top:25px; background:none; border:none; color:white; font-size:24px;">←</button><h3>RIWAYAT</h3></div>
    <div class="card">
        <h3>PENCARIAN DATA</h3>
        <input type="date" id="filterTgl" onchange="tampilRiwayat(false)">
        <button type="button" onclick="tampilRiwayat(true)" style="margin-top:10px; width:100%; padding:10px; background:#17a2b8; color:white; border:none; border-radius:5px;">📅 SEMUA TANGGAL</button>
        <button type="button" onclick="exportExcel()" style="margin-top:5px; width:100%; padding:10px; background:#217346; color:white; border:none; border-radius:5px;">📊 UNDUH EXCEL (CSV)</button>
        <div id="listRiwayat" style="margin-top:15px;"></div>
    </div>
</div>

<div id="hal-harga" class="halaman">
    <div class="header-app"><button type="button" onclick="bukaHalaman('hal-dashboard')" style="position:absolute; left:20px; top:25px; background:none; border:none; color:white; font-size:24px;">←</button><h3>DAFTAR HARGA</h3></div>
    <div class="card">
        <label>Tambah / Update Barang</label>
        <input type="text" id="editNama" placeholder="Nama Sampah Baru">
        <input type="number" id="editHarga" placeholder="Harga Satuan" style="margin-top:8px">
        <button type="button" class="btn-action btn-green" onclick="simpanHargaBaru()">SIMPAN PERUBAHAN</button>
        <div style="overflow-x:auto;">
            <table><thead><tr><th>Nama Sampah</th><th>Harga</th><th style="width:50px">Aksi</th></tr></thead><tbody id="isiTabelHarga"></tbody></table>
        </div>
    </div>
</div>

<div id="hal-pesan" class="halaman">
    <div class="header-app"><button type="button" onclick="bukaHalaman('hal-dashboard')" style="position:absolute; left:20px; top:25px; background:none; border:none; color:white; font-size:24px;">←</button><h3>CHAT GRUP</h3></div>
    <div class="card">
        <div class="chat-area" id="areaChat"></div>
        <div style="display:flex; gap:8px; margin-top:15px;">
            <input type="text" id="msgInput" placeholder="Ketik pesan..." style="flex:1">
            <button type="button" onclick="kirimPesan()" class="btn-green" style="padding:10px 20px; border:none; border-radius:8px; color:white;">➤ KIRIM</button>
        </div>
    </div>
</div>

<script>
    // Penanganan error bawaan agar jika ada script macet, tetap diberitahu
    window.onerror = function(msg, url, line) {
        alert("Pesan Sistem: " + msg + " di baris " + line);
    };

    // 1. KONFIGURASI FIREBASE (Dibungkus Try-Catch agar iPhone dengan keamanan ketat tidak crash)
    let db;
    try {
        const firebaseConfig = {
            apiKey: "AIzaSyCdts9EGj2hQ6pVTWv67X2Bp9AbXywvPc8",
            authDomain: "banker12-639c6.firebaseapp.com",
            projectId: "banker12-639c6",
            storageBucket: "banker12-639c6.firebasestorage.app",
            messagingSenderId: "357336491345",
            appId: "1:357336491345:web:f1800de7c62a92fc491f70",
            measurementId: "G-XFRF6X1T2K",
            databaseURL: "https://banker12-639c6-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        db = firebase.database(); 
    } catch (e) {
        alert("Koneksi Firebase terhalang. Pastikan internet stabil dan matikan Private Browsing jika data tidak muncul.");
    }

    // 2. DATA MASTER HARGA
    const defaultHarga = {
        "Minyak Jelantah": {h: 4300, u: "Kg"}, "Kardus": {h: 1400, u: "Kg"},
        "Duplek": {h: 900, u: "Kg"}, "Koran": {h: 1400, u: "Kg"}, "Buku": {h: 1200, u: "Kg"},
        "Putihan kertas": {h: 1500, u: "Kg"}, "Kantong Semen": {h: 1300, u: "Kg"},
        "Botol plastik Bersih -Bening": {h: 2000, u: "Kg"}, "Botol plastik kotor": {h: 1000, u: "Kg"},
        "Gelas plastik Bersih": {h: 2000, u: "Kg"}, "Gelas plastik Kotor": {h: 1000, u: "Kg"},
        "Gelas plastik Warna": {h: 1000, u: "Kg"}, "Gelas plastik Ale Ale": {h: 1000, u: "Kg"},
        "Tutup botol plastik": {h: 2000, u: "Kg"}, "Tutup Galon": {h: 300, u: "Kg"},
        "Galon Le mineral": {h: 2000, u: "Kg"}, "Naso": {h: 2000, u: "Kg"},
        "Mika Kristal": {h: 2000, u: "Kg"}, "Plastik Bening / Lembaran": {h: 800, u: "Kg"},
        "Plastik Bekas Minyak kemasan": {h: 500, u: "Kg"}, "Plastik Kresek/Asoy": {h: 300, u: "Kg"},
        "Botol Beling/Kaca": {h: 300, u: "Kg"}, "Botol Warna / Kecap": {h: 500, u: "Kg"},
        "Botol Bir": {h: 700, u: "Kg"}, "Alumunium Pocari": {h: 10000, u: "Kg"},
        "Alumunium Panci": {h: 12500, u: "Kg"}, "Alumunium Siku": {h: 14000, u: "Kg"},
        "Besi": {h: 3200, u: "Kg"}, "Aki": {h: 7000, u: "Pcs"}, "Kabel isi": {h: 2000, u: "Kg"},
        "Kaset cd": {h: 3500, u: "Kg"}, "Kaleng besi": {h: 4500, u: "Kg"}, "emberan": {h: 1000, u: "Kg"},
        "Tembaga": {h: 80000, u: "Kg"}, "Kuningan": {h: 60000, u: "Kg"}, "Magicom": {h: 5000, u: "Pcs"},
        "Kipas Angin": {h: 5000, u: "Pcs"}, "gabrukan": {h: 1000, u: "Kg"}, "alumunium": {h: 12000, u: "Kg"},
        "Baja ringan": {h: 3000, u: "Kg"}, "Paralon": {h: 1000, u: "Kg"}, "Botol plastik warna": {h: 1000, u: "Kg"},
        "galon utuh": {h: 5000, u: "Pcs"}, "Karpet talang": {h: 500, u: "Kg"}, "Mesin cuci 2 tbg": {h: 5000, u: "Pcs"},
        "Setrika": {h: 5000, u: "Pcs"}, "Blender utuh": {h: 5000, u: "Pcs"}, "Elektronik": {h: 2000, u: "Kg"}, "Besi paku": {h: 1500, u: "Kg"},"Dispenser utuh": {h: 5000, u: "Pcs"},
    };

    let daftarHarga = JSON.parse(localStorage.getItem('master_harga')) || defaultHarga;
    let keranjang = [];
    let editKey = null; 
    let dataFull = []; 
    let userAktif = "";

    // 3. SISTEM LOGIN (10 USER)
    const users = {
        "admin":"123",
        "mulyadi":"123",
        "jun":"123",
        "unggul":"123",
        "yoga":"123",
        "amin":"123",
        "rapik":"123",
        "ari":"123",
        "qq":"123",
        "user":"123"
    };

    // FUNGSI LOGIN YANG DIPERKUAT UNTUK iPHONE
    function prosesLogin() {
        let elUser = document.getElementById('userLogin');
        let elPass = document.getElementById('passLogin');
        
        // Memaksa huruf kecil dan menghapus semua jenis spasi yang ditambahkan otomatis oleh keyboard HP
        let u = elUser.value.toLowerCase().replace(/\s+/g, '');
        let p = elPass.value.trim();

        if(users[u] && users[u] === p) {
            userAktif = u;
            document.getElementById('helloUser').innerText = "Petugas: " + u;
            
            // Memaksa keyboard iPhone tertutup saat login berhasil
            elUser.blur(); 
            elPass.blur();
            
            bukaHalaman('hal-dashboard');
        } else {
            alert("Akses Ditolak: Pengguna tidak terdaftar atau password salah!");
        }
    }

    function logout() {
        userAktif = "";
        document.getElementById('userLogin').value = "";
        document.getElementById('passLogin').value = "";
        bukaHalaman('loginPage');
    }

    function bukaHalaman(id) {
        document.querySelectorAll('.halaman').forEach(h => h.style.display = 'none');
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById(id).style.display = (id === 'loginPage') ? 'flex' : 'block';
        
        if(id === 'hal-input') refreshDatalist();
        if(id === 'hal-riwayat') tampilRiwayat(true); 
        if(id === 'hal-harga') updateTabelMaster();
    }

    // 4. LOGIKA TIMBANGAN
    function refreshDatalist() {
        const dl = document.getElementById('daftarSampah');
        dl.innerHTML = '';
        Object.keys(daftarHarga).sort().forEach(k => {
            let opt = document.createElement('option'); opt.value = k; dl.appendChild(opt);
        });
        document.getElementById('tgl').value = new Date().toLocaleDateString('en-CA');
    }

    function pilihBarang() {
        let val = document.getElementById('jenisInput').value;
        if(daftarHarga[val]) {
            document.getElementById('harga').value = daftarHarga[val].h;
            hitungSub();
        }
    }

    function hitungSub() {
        let h = parseFloat(document.getElementById('harga').value) || 0;
        let b = parseFloat(document.getElementById('berat').value.replace(',', '.')) || 0;
        document.getElementById('subtotal').value = Math.round(h * b).toLocaleString('id-ID');
    }

    function tambahItem() {
        let j = document.getElementById('jenisInput').value;
        let h = parseFloat(document.getElementById('harga').value);
        let b = parseFloat(document.getElementById('berat').value.replace(',', '.')) || 0;
        if(!j || !h || b <= 0) return alert("Lengkapi jenis sampah dan berat!");

        keranjang.push({ j: j, b: b, h: h, s: Math.round(h*b) });
        updateStruk();
        document.getElementById('jenisInput').value = "";
        document.getElementById('berat').value = "";
        document.getElementById('harga').value = "";
        document.getElementById('subtotal').value = "";
    }

    function updateStruk() {
        let box = document.getElementById('boxStruk');
        let tIsi = document.getElementById('isiStruk');
        if(keranjang.length == 0) { box.style.display='none'; return; }
        box.style.display='block';
        tIsi.innerHTML = ""; let total = 0;
        keranjang.forEach((it, i) => {
            total += it.s;
            tIsi.innerHTML += `<tr><td>${it.j}</td><td>${it.b}</td><td>${it.s.toLocaleString('id-ID')}</td>
            <td class="no-print"><button onclick="hapusItemKeranjang(${i})" style="color:red; border:none; background:none; cursor:pointer;">Hapus</button></td></tr>`;
        });
        document.getElementById('totalStruk').innerText = "Total Tagihan: Rp " + total.toLocaleString('id-ID');
        document.getElementById('infoStruk').innerHTML = `
            <b>Petugas:</b> ${userAktif}<br>
            <b>Tanggal:</b> ${document.getElementById('tgl').value}<br>
            <b>Nasabah:</b> ${document.getElementById('nama').value} (RT ${document.getElementById('rt').value})
        `;
    }

    function hapusItemKeranjang(i) { keranjang.splice(i,1); updateStruk(); }

    function simpanTransaksi() {
        if(keranjang.length === 0) return alert("Nota masih kosong!");
        if(!db) return alert("Gagal menyimpan, koneksi database terputus.");

        let data = {
            tgl: document.getElementById('tgl').value,
            nama: document.getElementById('nama').value || "Umum",
            rt: document.getElementById('rt').value || "-",
            items: [...keranjang],
            total: keranjang.reduce((a, b) => a + b.s, 0),
            petugas: userAktif,
            waktuSimpan: Date.now()
        };

        if(editKey){
            db.ref('riwayat_timbangan/' + editKey).set(data);
            editKey = null;
        } else {
            db.ref('riwayat_timbangan').push(data);
        }

        let localData = JSON.parse(localStorage.getItem('riwayat_local')) || [];
        localData.push(data);
        localStorage.setItem('riwayat_local', JSON.stringify(localData));

        alert("Data tersimpan!");
        resetForm();
    }

    function resetForm() {
        keranjang = [];
        document.getElementById('nama').value = ""; 
        document.getElementById('rt').value = "";
        document.getElementById('boxStruk').style.display = 'none';
        editKey = null;
    }

    // 5. LOGIKA RIWAYAT
    function tampilRiwayat(semua = false) {
        if(!db) return;
        let f = document.getElementById('filterTgl').value;
        let div = document.getElementById('listRiwayat');
        div.innerHTML = "<center>Memuat data...</center>";

        db.ref('riwayat_timbangan').once('value').then(snapshot => {
            let dataFirebase = [];
            snapshot.forEach(child => {
                let item = child.val();
                item.fbKey = child.key;
                dataFirebase.push(item);
            });

            dataFull = dataFirebase; 

            let filtered = semua ? dataFirebase : dataFirebase.filter(d => d.tgl === f);
            div.innerHTML = "";

            if(filtered.length === 0){
                div.innerHTML = "<center>Tidak ada data ditemukan</center>";
                return;
            }

            filtered.reverse().forEach(d => {
                div.innerHTML += `
                <div class="card" style="border-left:5px solid var(--secondary); display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <b>${d.nama} (RT ${d.rt})</b><br>
                        <small>${d.tgl} | Petugas: ${d.petugas || '-'}</small><br>
                        <span style="color:var(--secondary); font-weight:bold;">Rp ${d.total.toLocaleString('id-ID')}</span>
                    </div>
                    <div>
                        <div style="display:flex; gap:5px;">
                            <button onclick="editData('${d.fbKey}')" style="padding:8px; background:#007bff; color:white; border:none; border-radius:5px;">EDIT</button>
                            <button onclick="hapusRiwayat('${d.fbKey}')" style="padding:8px 12px; background:#dc3545; color:white; border:none; border-radius:5px;">X</button>
                        </div>
                    </div>
                </div>`;
            });
        });
    }

    function editData(key) {
        if(!db) return;
        db.ref('riwayat_timbangan/' + key).once('value', (snap) => {
            let d = snap.val();
            editKey = key;
            bukaHalaman('hal-input');
            document.getElementById('tgl').value = d.tgl;
            document.getElementById('nama').value = d.nama;
            document.getElementById('rt').value = d.rt;
            keranjang = d.items || [];
            updateStruk();
            alert("Data ditarik ke form Input. Silakan ubah lalu simpan kembali.");
        });
    }

    function hapusRiwayat(key) {
        if(!db) return;
        if(confirm("Hapus data ini dari semua perangkat?")) {
            db.ref('riwayat_timbangan/' + key).remove()
                .then(() => { alert("Data terhapus!"); tampilRiwayat(true); })
                .catch((e) => alert("Gagal hapus: " + e.message));
        }
    }

    // 6. EXCEL (CSV)
    function exportExcel() {
    if(dataFull.length === 0) return alert("Tidak ada data untuk diunduh!");
    
    // Header CSV diperbarui untuk menyertakan Jenis Sampah dan Berat
    let csv = "\uFEFFTanggal;Nama;RT;Jenis Sampah;Berat (Kg);Harga;Subtotal;Total Nota;Petugas\n";
    
    dataFull.forEach(d => {
        // Cek jika ada item di dalam transaksi
        if (d.items && d.items.length > 0) {
            d.items.forEach((it, index) => {
                // Kolom ringkasan (Tanggal, Nama, RT, Total Nota, Petugas) 
                // hanya ditampilkan di baris pertama tiap nota agar rapi, 
                // atau diulang setiap baris jika ingin data mentah yang mudah difilter.
                // Di bawah ini saya buat diulang setiap baris agar mudah diolah di Excel.
                
                let row = [
                    d.tgl,
                    d.nama,
                    d.rt,
                    it.j, // Jenis Sampah
                    it.b, // Berat
                    it.h, // Harga Satuan
                    it.s, // Subtotal per item
                    d.total, // Total keseluruhan satu nota
                    d.petugas
                ];
                
                csv += row.join(";") + "\n";
            });
        }
    });

    let blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "riwayat_lengkap_banker12.csv";
    link.click();
}


    // 7. DAFTAR HARGA
    function updateTabelMaster() {
        let t = document.getElementById('isiTabelHarga'); t.innerHTML = "";
        Object.keys(daftarHarga).sort().forEach(k => {
            t.innerHTML += `<tr><td>${k}</td><td>Rp ${daftarHarga[k].h.toLocaleString('id-ID')}</td>
            <td><button onclick="hapusHarga('${k}')" style="color:red; border:none; background:none;">Hapus</button></td></tr>`;
        });
    }

    function simpanHargaBaru() {
        let n = document.getElementById('editNama').value;
        let h = document.getElementById('editHarga').value;
        if(n && h) {
            daftarHarga[n] = { h: parseInt(h), u: "Kg" };
            localStorage.setItem('master_harga', JSON.stringify(daftarHarga));
            alert("Harga Berhasil Disimpan!");
            document.getElementById('editNama').value = ""; document.getElementById('editHarga').value = "";
            updateTabelMaster();
        }
    }

    function hapusHarga(k) { if(confirm("Hapus "+k+"?")) { delete daftarHarga[k]; localStorage.setItem('master_harga', JSON.stringify(daftarHarga)); updateTabelMaster(); } }

    // 8. CHAT FIREBASE
    function kirimPesan() {
        if(!db) return;
        let txt = document.getElementById('msgInput').value; 
        if(!txt || userAktif === "") return;
        db.ref('chat_grup').push({
            pengirim: userAktif,
            pesan: txt,
            waktu: new Date().getTime()
        });
        document.getElementById('msgInput').value = "";
    }

    if(db) {
        db.ref('chat_grup').on('child_added', function(snapshot) {
            let data = snapshot.val();
            let tipeBuble = (data.pengirim === userAktif) ? 'kanan' : 'kiri';
            let area = document.getElementById('areaChat');
            area.innerHTML += `<div class="bubble ${tipeBuble}"><small><b>${data.pengirim}</b></small><br>${data.pesan}</div>`;
            area.scrollTop = area.scrollHeight;
        });
    }
</script>
